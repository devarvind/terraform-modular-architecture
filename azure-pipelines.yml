trigger:
- main

pool: nokia

stages: 
  - stage: terraformdeploy
    jobs:
      - job: terraforminstaltoplan
        displayName: terraforminstaltoplan
        steps:
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            backendServiceArm: 'nokia'
            backendAzureRmStorageAccountName: 'storagenokia12'
            backendAzureRmContainerName: 'nokia12'
            backendAzureRmKey: 'terraform.statefile'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'validate'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'plan'
            environmentServiceNameAzureRM: 'nokia'
      
      - job: scaning
        displayName: scaning
        steps:
        - task: tfsec@1
          inputs:
            version: 'v1.26.0'
            dir: '$(System.DefaultWorkingDirectory)'

      - job: manualvalidation
        pool: server
        displayName: manualvalidation
        dependsOn: terraforminstaltoplan
        steps:
        - task: ManualValidation@1
          inputs:
            notifyUsers: 'arvinddevops17@gmail.com'
            approvers: 'arvinddevops17@gmail.com'
            instructions: 'Please approve task completed'
            onTimeout: 'resume'

  - stage: terraformapply
    jobs:
      - job: terraforminitandapply
        steps:
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            backendServiceArm: 'nokia'
            backendAzureRmStorageAccountName: 'storagenokia12'
            backendAzureRmContainerName: 'nokia12'
            backendAzureRmKey: 'terraform.statefile'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'apply'
            commandOptions: '-auto-approve'
            environmentServiceNameAzureRM: 'nokia'

   


